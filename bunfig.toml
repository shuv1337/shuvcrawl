[test]
# Exclude integration and Docker API tests from default `bun test`.
# - integration tests require a real Chromium binary
# - api tests require the dedicated Docker harness (`bun run test:api`)
# Run integration tests with: bun test tests/integration/
# Run API tests with: ./scripts/test-api-docker.sh
pathIgnorePatterns = ["**/integration/**", "**/api/**"]
