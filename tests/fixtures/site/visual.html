<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Visual Fixture</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a, #0ea5e9);
        color: white;
        font-family: system-ui, sans-serif;
      }
      .card {
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 20px;
        padding: 48px;
        backdrop-filter: blur(6px);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Visual Fixture</h1>
      <p>Used for screenshots and PDF rendering.</p>
    </section>
  </body>
</html>
